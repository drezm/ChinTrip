services:
  - type: web
    name: china-trip-companion
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /unlock
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        sync: false
      - key: SITE_PIN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PGSSLMODE
        value: require
