<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>China Trip offline</title>
    <style>
      :root {
        color: #18181b;
        background: #f7f7f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 247, 245, 0.96)),
          #f7f7f5;
      }

      main {
        width: min(100%, 380px);
        border: 1px solid #dedbd2;
        border-radius: 8px;
        padding: 22px;
        background: #ffffff;
        box-shadow: 0 16px 34px rgba(24, 24, 27, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.05;
      }

      p {
        margin: 12px 0 0;
        color: #646b7a;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        margin-top: 18px;
        border-radius: 8px;
        padding: 0 14px;
        color: #ffffff;
        background: #10746d;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет связи</h1>
      <p>
        China Trip уже готов к офлайн-режиму. Если эта страница открылась вместо
        приложения, вернись назад или обнови страницу, когда появится интернет.
      </p>
      <a href="/">Открыть приложение</a>
    </main>
  </body>
</html>
